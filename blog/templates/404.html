<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link rel="stylesheet" href="app.css" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
    <div class="text-center max-w-lg">
        <h1 class="text-9xl font-bold text-gray-900 mb-4">404</h1>
        <p class="text-2xl text-gray-600 mb-2">Page Not Found</p>
        <p class="text-gray-500 mb-8">Sorry, the page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200">
            Go Home
        </a>
    </div>
</body>
</html>

{% extends "base.html" %} {% block content %}
<article class="max-w-3xl">
  <header class="mb-8 border-b border-gray-800 pb-6">
    <h1 class="text-4xl font-bold text-white mb-4">{{ page.title }}</h1>
    <p class="text-gray-400">
      <time datetime="{{ page.date }}">{{ page.date }}</time>
    </p>
  </header>
  <div class="prose prose-invert prose-lg max-w-none text-gray-300">
    {{ page.content | safe }}
  </div>
  <footer class="mt-12 pt-6 border-t border-gray-800">
    <a href="{{ get_url(path='@/_index.md') }}" class="text-blue-400 hover:text-blue-300 transition-colors">
      &larr; Back to all posts
    </a>
  </footer>
</article>
{% endblock content %}
